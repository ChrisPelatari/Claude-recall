name: ClaudeRecall
options:
  bundleIdPrefix: com.pelatari
  deploymentTarget:
    macOS: "15.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"
targets:
  ClaudeRecall:
    type: application
    platform: macOS
    sources:
      - path: ClaudeRecall/Sources
    resources:
      - path: ClaudeRecall/Sources/Resources/Assets.xcassets
      - path: ClaudeRecall/Sources/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pelatari.claude-recall
        PRODUCT_NAME: Claude Recall
        MARKETING_VERSION: "0.4.2"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: Claude Recall
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ClaudeRecall/Sources/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        # Local dev defaults: sign-to-run-locally, no entitlements, no team needed.
        # Release builds opt in to sandbox + iCloud-KVS entitlements (see below).
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: ""
      configs:
        Release:
          # Mac App Store / signed-release build: sandbox + iCloud-KVS active.
          # Requires an Apple Dev team in Xcode → Settings → Accounts. The direct-
          # distribution GitHub-release build re-overrides CODE_SIGN_ENTITLEMENTS
          # to "" via the archive command in MAS_METADATA.md.
          CODE_SIGN_ENTITLEMENTS: ClaudeRecall.entitlements
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash

  ClaudeRecall-iOS:
    type: application
    platform: iOS
    sources:
      - path: ClaudeRecall/Sources
    resources:
      - path: ClaudeRecall/Sources/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pelatari.claude-recall-ios
        PRODUCT_NAME: Claude Recall
        MARKETING_VERSION: "0.4.2"
        CURRENT_PROJECT_VERSION: "3"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Claude Recall
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ClaudeRecall/Sources/Resources/Info.plist
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash
